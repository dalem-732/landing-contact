# Render Blueprint: https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect GitHub repo → Apply

services:
  - type: web
    name: landing-contact
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_FORMAT
        value: json
      - key: DATABASE_URL
        fromDatabase:
          name: landing-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: landing-redis
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false

  - type: worker
    name: landing-worker
    runtime: docker
    plan: free
    dockerCommand: python -m app.workers.run_worker
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: landing-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: landing-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false

  - type: keyvalue
    name: landing-redis
    plan: free
    ipAllowList: []

databases:
  - name: landing-db
    plan: free
